<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<title>Shark Meat Game</title>

<style>
body{
  text-align:center;
  background:linear-gradient(135deg,#001f3f,#003366,#000814);
  color:white;
  font-family:Arial;
  margin-top:30px;
}

h1{
  font-size:28px;
}

#meat{
  font-size:32px;
  margin:15px;
  color:#ff4d4d;
}

img{
  width:200px;
  transition:0.2s;
}

.eat{
  transform:scale(1.2) rotate(5deg);
}

button{
  padding:15px 30px;
  font-size:18px;
  border-radius:15px;
  border:none;
  background:#ff3333;
  color:white;
  cursor:pointer;
  margin-top:15px;
  transition:0.2s;
}

button:active{
  transform:scale(0.9);
}

.result{
  margin-top:15px;
  min-height:25px;
}
</style>
</head>

<body>

<h1>🦈 SHARK FEEDER</h1>

<div id="meat">Мясо: 0 🥩</div>

<img id="shark" src="https://i.imgur.com/4AiXzf8.png">

<br>

<button onclick="feed()">Покормить акулу</button>

<div class="result" id="result"></div>

<script>

let meat = parseInt(localStorage.getItem("meat")) || 0;
document.getElementById("meat").innerText = "Мясо: " + meat + " 🥩";

function feed(){

  let shark = document.getElementById("shark");
  shark.classList.add("eat");

  setTimeout(() => {
    shark.classList.remove("eat");
  }, 200);

  let chance = Math.random();

  if(chance < 0.8){
    meat += 5;
    show("😋 Акула довольна! +5 мяса");
  }
  else if(chance < 0.97){
    meat += 25;
    show("🔥 ГОЛОДНАЯ АКУЛА! +25 мяса!");
  }
  else{
    meat = 0;
    show("💀 Акула съела ВСЁ мясо!");
  }

  localStorage.setItem("meat", meat);
  document.getElementById("meat").innerText = "Мясо: " + meat + " 🥩";
}

function show(text){
  document.getElementById("result").innerText = text;
}

</script>

</body>
</html>
